syntax = "proto3";

package api.billing.v1;

option go_package = "micro-one-api/api/billing/v1;billingv1";

service BillingService {
  rpc ReserveQuota(ReserveQuotaRequest) returns (ReserveQuotaReply);
  rpc CommitQuota(CommitQuotaRequest) returns (CommitQuotaReply);
  rpc ReleaseQuota(ReleaseQuotaRequest) returns (ReleaseQuotaReply);
  rpc GetAccountSnapshot(GetAccountSnapshotRequest) returns (GetAccountSnapshotReply);
}

message ReserveQuotaRequest {
  string request_id = 1;
  int64 user_id = 2;
  int64 token_id = 3;
  int64 quota = 4;
  string model = 5;
}

message ReserveQuotaReply {
  string reservation_id = 1;
  bool reserved = 2;
  string message = 3;
}

message CommitQuotaRequest {
  string request_id = 1;
  string reservation_id = 2;
  int64 actual_quota = 3;
}

message CommitQuotaReply {
  bool committed = 1;
  string message = 2;
}

message ReleaseQuotaRequest {
  string request_id = 1;
  string reservation_id = 2;
}

message ReleaseQuotaReply {
  bool released = 1;
  string message = 2;
}

message GetAccountSnapshotRequest {
  int64 user_id = 1;
  int64 token_id = 2;
}

message GetAccountSnapshotReply {
  int64 user_quota = 1;
  int64 token_quota = 2;
  bool unlimited = 3;
}

