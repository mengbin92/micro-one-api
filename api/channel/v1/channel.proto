syntax = "proto3";

package api.channel.v1;

import "api/common/v1/common.proto";

option go_package = "micro-one-api/api/channel/v1;channelv1";

service ChannelService {
  rpc SelectChannel(SelectChannelRequest) returns (SelectChannelReply);
  rpc SelectSubscriptionAccount(SelectSubscriptionAccountRequest) returns (SelectSubscriptionAccountReply);
  rpc GetSubscriptionAccount(GetSubscriptionAccountRequest) returns (GetSubscriptionAccountReply);
  rpc ListSubscriptionAccounts(ListSubscriptionAccountsRequest) returns (ListSubscriptionAccountsResponse);
  rpc ListOAuthRefreshCandidates(ListOAuthRefreshCandidatesRequest) returns (ListOAuthRefreshCandidatesResponse);
  rpc ClearSubscriptionAccountError(ClearSubscriptionAccountErrorRequest) returns (ClearSubscriptionAccountErrorResponse);
  rpc SetSubscriptionAccountError(SetSubscriptionAccountErrorRequest) returns (SetSubscriptionAccountErrorResponse);
  rpc SetTempUnschedulable(SetTempUnschedulableRequest) returns (SetTempUnschedulableResponse);
  rpc ClearTempUnschedulable(ClearTempUnschedulableRequest) returns (ClearTempUnschedulableResponse);
  rpc CreateSubscriptionAccount(CreateSubscriptionAccountRequest) returns (CreateSubscriptionAccountResponse);
  rpc UpdateSubscriptionAccount(UpdateSubscriptionAccountRequest) returns (UpdateSubscriptionAccountResponse);
  rpc DeleteSubscriptionAccount(DeleteSubscriptionAccountRequest) returns (DeleteSubscriptionAccountResponse);
  rpc ChangeSubscriptionAccountStatus(ChangeSubscriptionAccountStatusRequest) returns (ChangeSubscriptionAccountStatusResponse);
  rpc RecordAccountQuotaSnapshot(RecordAccountQuotaSnapshotRequest) returns (RecordAccountQuotaSnapshotResponse);
  rpc RecordSubscriptionAccountQuotaUsage(RecordSubscriptionAccountQuotaUsageRequest) returns (RecordSubscriptionAccountQuotaUsageResponse);
  rpc AggregateSubscriptionAccountQuotaEvents(AggregateSubscriptionAccountQuotaEventsRequest) returns (AggregateSubscriptionAccountQuotaEventsResponse);
  rpc ResetSubscriptionAccountQuota(ResetSubscriptionAccountQuotaRequest) returns (ResetSubscriptionAccountQuotaResponse);
  rpc GetChannel(GetChannelRequest) returns (GetChannelReply);
  rpc ListAvailableModels(ListAvailableModelsRequest) returns (ListAvailableModelsReply);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc RecordChannelUsage(RecordChannelUsageRequest) returns (RecordChannelUsageResponse);
  rpc RecordChannelHealth(RecordChannelHealthRequest) returns (RecordChannelHealthResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
  rpc ChangeChannelStatus(ChangeChannelStatusRequest) returns (ChangeChannelStatusResponse);
  // ========== Model management (方案B) ==========
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc GetModel(GetModelRequest) returns (GetModelResponse);
  rpc CreateModel(CreateModelRequest) returns (CreateModelResponse);
  rpc UpdateModel(UpdateModelRequest) returns (UpdateModelResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);
  rpc ChangeModelStatus(ChangeModelStatusRequest) returns (ChangeModelStatusResponse);
  rpc BatchModels(BatchModelsRequest) returns (BatchModelsResponse);
  rpc ListModelAliases(ListModelAliasesRequest) returns (ListModelAliasesResponse);
  rpc CreateModelAlias(CreateModelAliasRequest) returns (CreateModelAliasResponse);
  rpc DeleteModelAlias(DeleteModelAliasRequest) returns (DeleteModelAliasResponse);
  rpc ListChannelModelMappings(ListChannelModelMappingsRequest) returns (ListChannelModelMappingsResponse);
  rpc UpsertChannelModelMapping(UpsertChannelModelMappingRequest) returns (UpsertChannelModelMappingResponse);
  rpc DeleteChannelModelMapping(DeleteChannelModelMappingRequest) returns (DeleteChannelModelMappingResponse);
  rpc ListSubscriptionModelMappings(ListSubscriptionModelMappingsRequest) returns (ListSubscriptionModelMappingsResponse);
  rpc UpsertSubscriptionModelMapping(UpsertSubscriptionModelMappingRequest) returns (UpsertSubscriptionModelMappingResponse);
  rpc DeleteSubscriptionModelMapping(DeleteSubscriptionModelMappingRequest) returns (DeleteSubscriptionModelMappingResponse);
  // ========== Sprint 4: Usage statistics ==========
  rpc RecordModelUsage(RecordModelUsageRequest) returns (RecordModelUsageResponse);
  rpc ListModelUsageStats(ListModelUsageStatsRequest) returns (ListModelUsageStatsResponse);

}

message SelectChannelRequest {
  string group = 1;
  string model = 2;
  bool exclude_first_priority = 3;
}

message SelectChannelReply {
  common.v1.ChannelInfo channel = 1;
}

message SelectSubscriptionAccountRequest {
  string group = 1;
  string model = 2;
  string platform = 3;
  bool exclude_first_priority = 4;
}

message SelectSubscriptionAccountReply {
  common.v1.SubscriptionAccountInfo account = 1;
}

message GetSubscriptionAccountRequest {
  int64 account_id = 1;
}

message GetSubscriptionAccountReply {
  common.v1.SubscriptionAccountInfo account = 1;
}

message GetChannelRequest {
  int64 channel_id = 1;
}

message GetChannelReply {
  common.v1.ChannelInfo channel = 1;
}

message ListAvailableModelsRequest {
  string group = 1;
}

message ListAvailableModelsReply {
  repeated string models = 1;
}

// ========== 渠道管理 ==========

message ListChannelsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  int32 type = 6;
}

message ListChannelsResponse {
  repeated common.v1.ChannelSummary channels = 1;
  int64 total = 2;
}

message ListSubscriptionAccountsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  string platform = 6;
}

message ListSubscriptionAccountsResponse {
  repeated common.v1.SubscriptionAccountSummary accounts = 1;
  int64 total = 2;
}

message ListOAuthRefreshCandidatesRequest {
  int64 within_seconds = 1;
}

message ListOAuthRefreshCandidatesResponse {
  repeated int64 account_ids = 1;
}

message ClearSubscriptionAccountErrorRequest {
  int64 account_id = 1;
}

message ClearSubscriptionAccountErrorResponse {
  bool success = 1;
  string message = 2;
}

message SetSubscriptionAccountErrorRequest {
  int64 account_id = 1;
  string message = 2;
}

message SetSubscriptionAccountErrorResponse {
  bool success = 1;
  string message = 2;
}

message SetTempUnschedulableRequest {
  int64 account_id = 1;
  int64 until = 2;
  string reason = 3;
}

message SetTempUnschedulableResponse {
  bool success = 1;
  string message = 2;
}

message ClearTempUnschedulableRequest {
  int64 account_id = 1;
}

message ClearTempUnschedulableResponse {
  bool success = 1;
  string message = 2;
}

message CreateSubscriptionAccountRequest {
  string name = 1;
  string platform = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
  double quota_limit_usd = 14;
  double quota_used_usd = 15;
  double quota_daily_limit_usd = 16;
  double quota_daily_used_usd = 17;
  int64 quota_daily_window_start = 18;
  double quota_weekly_limit_usd = 19;
  double quota_weekly_used_usd = 20;
  int64 quota_weekly_window_start = 21;
  double rate_multiplier = 22;
  double quota_5h_limit_usd = 23;
  double quota_5h_used_usd = 24;
  int64 quota_5h_window_start = 25;
  int32 rpm_limit = 26;
  double session_window_limit_usd = 27;
  string quota_reset_strategy = 28;
  string quota_timezone = 29;
}

message CreateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
  int64 account_id = 3;
}

message UpdateSubscriptionAccountRequest {
  int64 id = 1;
  string name = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
  optional double quota_limit_usd = 14;
  optional double quota_used_usd = 15;
  optional double quota_daily_limit_usd = 16;
  optional double quota_daily_used_usd = 17;
  optional int64 quota_daily_window_start = 18;
  optional double quota_weekly_limit_usd = 19;
  optional double quota_weekly_used_usd = 20;
  optional int64 quota_weekly_window_start = 21;
  optional double rate_multiplier = 22;
  optional double quota_5h_limit_usd = 23;
  optional double quota_5h_used_usd = 24;
  optional int64 quota_5h_window_start = 25;
  optional int32 rpm_limit = 26;
  optional double session_window_limit_usd = 27;
  optional string quota_reset_strategy = 28;
  optional string quota_timezone = 29;
}

message UpdateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSubscriptionAccountRequest {
  int64 account_id = 1;
}

message DeleteSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message ChangeSubscriptionAccountStatusRequest {
  int64 account_id = 1;
  int32 status = 2;
}

message ChangeSubscriptionAccountStatusResponse {
  bool success = 1;
  string message = 2;
}

// RecordAccountQuotaSnapshotRequest upserts a Codex 5h/7d upstream quota
// snapshot for an account. Optional fields are absent when the upstream did not
// report that window. updated_at is unix seconds.
message RecordAccountQuotaSnapshotRequest {
  int64 account_id = 1;
  optional double primary_used_percent = 2;
  optional int32 primary_reset_after_seconds = 3;
  optional int32 primary_window_minutes = 4;
  optional double secondary_used_percent = 5;
  optional int32 secondary_reset_after_seconds = 6;
  optional int32 secondary_window_minutes = 7;
  optional double primary_over_secondary_percent = 8;
  int64 updated_at = 9;
  bool snapshot_paused = 10;
}

message RecordAccountQuotaSnapshotResponse {
  bool success = 1;
  string message = 2;
}

message RecordSubscriptionAccountQuotaUsageRequest {
  int64 account_id = 1;
  double cost_usd = 2;
  int64 occurred_at = 3; // unix seconds; 0 means channel-service receive time
  string reservation_id = 4;
  string cost_source = 5;
}

message RecordSubscriptionAccountQuotaUsageResponse {
  bool success = 1;
  string message = 2;
}

message AggregateSubscriptionAccountQuotaEventsRequest {
  int64 account_id = 1;
  int64 start_time = 2; // unix seconds; 0 means unbounded
  int64 end_time = 3;   // unix seconds; 0 means unbounded
  int32 limit = 4;
}

message SubscriptionAccountQuotaEventAggregate {
  int64 subscription_account_id = 1;
  double cost_usd = 2;
  double charged_usd = 3;
  double average_rate_multiplier = 4;
  int64 count = 5;
  int64 last_occurred_at = 6;
}

message AggregateSubscriptionAccountQuotaEventsResponse {
  repeated SubscriptionAccountQuotaEventAggregate items = 1;
}

message ResetSubscriptionAccountQuotaRequest {
  int64 account_id = 1;
  string scope = 2; // total / 5h / daily / weekly / all
}

message ResetSubscriptionAccountQuotaResponse {
  bool success = 1;
  string message = 2;
}

message CreateChannelRequest {
  string name = 1;
  int32 type = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
}

message CreateChannelResponse {
  bool success = 1;
  string message = 2;
  int64 channel_id = 3;
}

message UpdateChannelRequest {
  int64 channel_id = 1;
  string name = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
  double balance = 12;
  int64 balance_updated_time = 13;
  string balance_refresh_last_error = 14;
  int64 balance_refresh_last_success_time = 15;
  int32 consecutive_balance_refresh_failures = 16;
  // when true, the three balance_refresh_* fields above are written to the channel as-is
  // (so callers can clear last_error by passing "" and reset the counter by passing 0).
  bool set_balance_refresh_fields = 17;
}

message UpdateChannelResponse {
  bool success = 1;
  string message = 2;
}

message RecordChannelUsageRequest {
  int64 channel_id = 1;
  int64 quota = 2;
}

message RecordChannelUsageResponse {
  bool success = 1;
  string message = 2;
}

message RecordChannelHealthRequest {
  int64 channel_id = 1;
  bool success = 2;
  string error = 3;
  int64 response_time = 4;
}

message RecordChannelHealthResponse {
  bool success = 1;
  string message = 2;
}

message DeleteChannelRequest {
  int64 channel_id = 1;
}

message DeleteChannelResponse {
  bool success = 1;
  string message = 2;
}

message ChangeChannelStatusRequest {
  int64 channel_id = 1;
  int32 status = 2;
}

message ChangeChannelStatusResponse {
  bool success = 1;
  string message = 2;
}

// ========== Model Management (方案B independent model registry) ==========

message ModelInfo {
  int64 id = 1;
  string model_id = 2;            // unique identifier, e.g. gpt-4o
  string display_name = 3;
  string description = 4;
  string provider = 5;
  string model_type = 6;          // chat, completion, embedding, image
  int32 context_window = 7;
  double pricing_input = 8;       // per 1K tokens
  double pricing_output = 9;
  int32 status = 10;              // 0=disabled, 1=enabled, 2=testing
  bool is_public = 11;
  repeated string capabilities = 12;
  repeated string tags = 13;
  string category = 14;
  string tier = 15;               // entry, standard, premium
  string metadata = 16;           // JSON string
  int64 created_at = 17;
  int64 updated_at = 18;
  // aggregated counts for list views
  int32 channel_count = 19;
  int32 subscription_count = 20;
}

message ModelSummary {
  int64 id = 1;
  string model_id = 2;
  string display_name = 3;
  string provider = 4;
  string model_type = 5;
  int32 status = 6;
  string category = 7;
  string tier = 8;
  bool is_public = 9;
  int32 channel_count = 10;
  int32 subscription_count = 11;
}

message ModelAlias {
  int64 id = 1;
  int64 model_pk = 2;   // FK → models.id
  string alias = 3;
  bool is_primary = 4;
  int64 created_at = 5;
}

message ModelChannelMapping {
  int64 id = 1;
  int64 channel_id = 2;
  int64 model_pk = 3;           // FK → models.id
  bool enabled = 4;
  int32 priority = 5;
  string config = 6;            // JSON
  int64 created_at = 7;
  int64 updated_at = 8;
}

message ModelSubscriptionMapping {
  int64 id = 1;
  int64 subscription_account_id = 2;
  int64 model_pk = 3;           // FK → models.id
  string group_name = 4;
  bool enabled = 5;
  int32 priority = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message ModelUsageStat {
  int64 id = 1;
  int64 model_pk = 2;
  string date = 3;              // YYYY-MM-DD
  int32 request_count = 4;
  int64 token_count = 5;
  int32 error_count = 6;
  int32 avg_latency = 7;
}

// ── ListModels ────────────────────────────────────────────────────────────
message ListModelsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;           // matches model_id or display_name
  string provider = 4;
  string model_type = 5;
  int32 status = 6;
  string category = 7;
  string tier = 8;
  bool public_only = 9;         // when true, exclude is_public=false
}

message ListModelsResponse {
  repeated ModelSummary models = 1;
  int64 total = 2;
}

// ── GetModel ──────────────────────────────────────────────────────────────
message GetModelRequest {
  // Exactly one of model_pk / model_id should be set.
  int64 model_pk = 1;
  string model_id = 2;
}

message GetModelResponse {
  ModelInfo model = 1;
  repeated ModelAlias aliases = 2;
  repeated ModelChannelMapping channel_mappings = 3;
  repeated ModelSubscriptionMapping subscription_mappings = 4;
}

// ── CreateModel ───────────────────────────────────────────────────────────
message CreateModelRequest {
  string model_id = 1;
  string display_name = 2;
  string description = 3;
  string provider = 4;
  string model_type = 5;
  int32 context_window = 6;
  double pricing_input = 7;
  double pricing_output = 8;
  int32 status = 9;
  bool is_public = 10;
  repeated string capabilities = 11;
  repeated string tags = 12;
  string category = 13;
  string tier = 14;
  string metadata = 15;
}

message CreateModelResponse {
  bool success = 1;
  string message = 2;
  int64 model_pk = 3;
}

// ── UpdateModel ───────────────────────────────────────────────────────────
message UpdateModelRequest {
  int64 model_pk = 1;
  string display_name = 2;
  string description = 3;
  string provider = 4;
  string model_type = 5;
  int32 context_window = 6;
  double pricing_input = 7;
  double pricing_output = 8;
  bool is_public = 9;
  repeated string capabilities = 10;
  repeated string tags = 11;
  string category = 12;
  string tier = 13;
  string metadata = 14;
}

message UpdateModelResponse {
  bool success = 1;
  string message = 2;
}

// ── DeleteModel ───────────────────────────────────────────────────────────
message DeleteModelRequest {
  int64 model_pk = 1;
}

message DeleteModelResponse {
  bool success = 1;
  string message = 2;
}

// ── ChangeModelStatus ─────────────────────────────────────────────────────
message ChangeModelStatusRequest {
  int64 model_pk = 1;
  int32 status = 2;
}

message ChangeModelStatusResponse {
  bool success = 1;
  string message = 2;
}

// ── BatchModels ───────────────────────────────────────────────────────────
message BatchModelsRequest {
  string action = 1;            // enable, disable, delete
  repeated int64 model_pks = 2;
}

message BatchModelsResponse {
  bool success = 1;
  string message = 2;
  int32 affected = 3;
}

// ── Model alias management ────────────────────────────────────────────────
message ListModelAliasesRequest {
  int64 model_pk = 1;
}

message ListModelAliasesResponse {
  repeated ModelAlias aliases = 1;
}

message CreateModelAliasRequest {
  int64 model_pk = 1;
  string alias = 2;
  bool is_primary = 3;
}

message CreateModelAliasResponse {
  bool success = 1;
  string message = 2;
  int64 alias_id = 3;
}

message DeleteModelAliasRequest {
  int64 alias_id = 1;
}

message DeleteModelAliasResponse {
  bool success = 1;
  string message = 2;
}

// ── Channel-model mapping ─────────────────────────────────────────────────
message ListChannelModelMappingsRequest {
  int64 channel_id = 1;
}

message ListChannelModelMappingsResponse {
  repeated ModelChannelMapping mappings = 1;
}

message UpsertChannelModelMappingRequest {
  int64 channel_id = 1;
  int64 model_pk = 2;
  bool enabled = 3;
  int32 priority = 4;
  string config = 5;
}

message UpsertChannelModelMappingResponse {
  bool success = 1;
  string message = 2;
}

message DeleteChannelModelMappingRequest {
  int64 channel_id = 1;
  int64 model_pk = 2;
}

message DeleteChannelModelMappingResponse {
  bool success = 1;
  string message = 2;
}

// ── Subscription-account-model mapping ────────────────────────────────────
message ListSubscriptionModelMappingsRequest {
  int64 subscription_account_id = 1;
}

message ListSubscriptionModelMappingsResponse {
  repeated ModelSubscriptionMapping mappings = 1;
}

message UpsertSubscriptionModelMappingRequest {
  int64 subscription_account_id = 1;
  int64 model_pk = 2;
  string group_name = 3;
  bool enabled = 4;
  int32 priority = 5;
}

message UpsertSubscriptionModelMappingResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSubscriptionModelMappingRequest {
  int64 subscription_account_id = 1;
  int64 model_pk = 2;
  string group_name = 3;
}

message DeleteSubscriptionModelMappingResponse {
  bool success = 1;
  string message = 2;
}

// ── Sprint 4: Model usage statistics ──────────────────────────────────────
message RecordModelUsageRequest {
  string model_id = 1;              // model identifier (case-insensitive)
  int32 request_count = 2;          // number of requests (default 1)
  int64 token_count = 3;            // total tokens consumed
  int32 error_count = 4;            // number of errors
  int32 avg_latency = 5;            // average latency in ms
  string date = 6;                  // YYYY-MM-DD (empty = today)
}

message RecordModelUsageResponse {
  bool success = 1;
  string message = 2;
}

message ListModelUsageStatsRequest {
  int64 model_pk = 1;               // filter by model pk (0 = all)
  string start_date = 2;            // YYYY-MM-DD (inclusive)
  string end_date = 3;              // YYYY-MM-DD (inclusive)
  int32 page = 4;
  int32 page_size = 5;
}

message ListModelUsageStatsResponse {
  repeated ModelUsageStat stats = 1;
  int64 total = 2;
}
