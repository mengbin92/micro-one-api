# Test override: exposes internal ports and adds mock upstream.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up -d

services:
  mock-upstream:
    image: python:3-alpine
    container_name: mock-upstream
    command: ["python3", "/mock/mock_server.py"]
    volumes:
      - ../../test/mockupstream/mock_server.py:/mock/mock_server.py:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  relay-gateway:
    environment:
      - PROVIDER_DISABLE_SSRF_CHECK=true

  identity-service:
    ports:
      - "8001:8001"
      - "9001:9001"

  billing-service:
    ports:
      - "8004:8004"
      - "9004:9004"

  channel-service:
    ports:
      - "8002:8002"
      - "9002:9002"
