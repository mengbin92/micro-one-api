version: '3.8'

services:
  relay-gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: relay-gateway
    environment:
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - RELAY_HTTP_ADDR=:8080
      - RELAY_PROVIDER_TIMEOUT=30s
      - RATE_LIMIT_REQUESTS_PER_SECOND=100
      - RATE_LIMIT_BURST=200
      - CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://app.yourdomain.com
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - channel-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  identity-service:
    image: golang:1.26-alpine
    container_name: identity-service
    working_dir: /app
    command: go run ./cmd/identity-service
    environment:
      - IDENTITY_GRPC_ADDR=:9001
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ../..:/app
    ports:
      - "9001:9001"
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  channel-service:
    image: golang:1.26-alpine
    container_name: channel-service
    working_dir: /app
    command: go run ./cmd/channel-service
    environment:
      - CHANNEL_GRPC_ADDR=:9002
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ../..:/app
    ports:
      - "9002:9002"
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  backend:
    driver: bridge
    internal: true  # Isolated network
